<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.css">
    <!-- Iconos de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/estilo.css">
    <title>Servicio Express</title>
</head>

<body>
    <main>
        <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><i class="bi bi-capsule"></i></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="index.html">Solicitud</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="registro.html">Registro</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="pendientes.html">Pendientes</a>
                        </li>
                    </ul>

                </div>
            </div>
        </nav>
        <section class="container-fluid mx-auto p-2">
            <h3 class="text-center pt-3"><strong>Solicitud de pedido de medicamentos</strong></h3>
            <div class="row mx-auto p-2">
                <div class="col">
                    <div class="row g-2 align-items-center pt-4">
                        <div class="col-6">
                            <label for="nombre" class="col-form-label">Nombre completo:</label>
                        </div>
                        <div class="col-6">
                            <input type="text" id="nombre" class="form-control" placeholder="Digite su nombre completo">
                        </div>
                    </div>
                    <div class="row g-2 align-items-center pt-3">
                        <div class="col-6">
                            <label for="cedula" class="col-form-label">Número de cédula:</label>
                        </div>
                        <div class="col-6">
                            <input type="number" id="cedula" class="form-control"
                                placeholder="Digite su número de cédula">
                        </div>
                    </div>
                    <div class="row g-2 align-items-center pt-3">
                        <div class="col-6">
                            <label for="telefono" class="col-form-label">Número de teléfono:</label>
                        </div>
                        <div class="col-6">
                            <input type="number" id="telefono" class="form-control" placeholder="Digite su teléfono">
                        </div>
                    </div>
                    <div class="row g-2 align-items-center pt-3">
                        <div class="col-6">
                            <label for="medicamento" class="col-form-label">Nombre del medicamento que desea
                                pedir:</label>
                        </div>
                        <div class="col-6">
                            <input type="text" id="medicamento" class="form-control"
                                placeholder="Digite el nombre del medicamento">
                        </div>
                    </div>
                    <div class="row g-2 align-items-center pt-3">
                        <div class="col-6">
                            <label for="direccion" class="col-form-label">Dirección detallada del lugar de
                                entrega</label>
                        </div>
                        <div class="col-6">
                            <input type="text" id="direccion" class="form-control"
                                placeholder="Digite la dirección detallada">
                        </div>
                    </div>
                    <div class="row g-2 align-items-center pt-3">
                        <div class="col-6">
                            <label for="urgencia" class="col-form-label">Urgencia del pedido</label>
                        </div>
                        <div class="col-6">
                            <select name="urgencia" id="uregencia" class="form-select">
                                <option value="alta">Baja</option>
                                <option value="media">Media</option>
                                <option value="baja">Alta</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="row mx-auto p-2">
                        <div class="col d-flex flex-column">
                            <div class="row g-2 align-items-center pt-3">
                                <div class="col-12">
                                    <label for="nombre" class="col-form-label">Detalles sobre el pedido:</label>
                                </div>
                                <div class="col-12">
                                    <textarea rows="8" class="form-control" placeholder="Comentarios"></textarea>
                                </div>
                            </div>
                            <div class="mt-auto align-self-end justify-content-end pt-5">
                                <button type="button" class="btn btn-primary btn-lg ">Realizar pedido</button>
                            </div>

                        </div>
                    </div>
                </div>
        </section>
    </main>
    <script src="js/bootstrap.bundle.js"></script>
</body>

</html>
